services:
  db:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mydoc24}
      POSTGRES_USER: ${POSTGRES_USER:-mydoc24}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mydoc24}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mydoc24}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    # The bind mount below can carry CRLF line endings from a Windows checkout.
    # Run a normalized copy so /bin/sh can execute the entrypoint reliably.
    entrypoint:
      - sh
      - -c
      - >-
        tr -d '\r' < /app/entrypoint.sh > /tmp/entrypoint.sh &&
        exec sh /tmp/entrypoint.sh
    env_file: .env
    environment:
      POSTGRES_HOST: db
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  scheduler:
    build: ./backend
    entrypoint: []
    command: ["python", "scheduler.py"]
    env_file: .env
    environment:
      POSTGRES_HOST: db
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    build: ./frontend
    env_file: .env
    environment:
      API_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
  frontend_node_modules:
